<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments/header :: header('Xác thực 2FA')}"></head>
  <body
    class="bg-app-bg text-slate-200 font-sans antialiased min-h-screen flex items-center justify-center relative overflow-hidden"
  >
    <!-- Background glow -->
    <div
      class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] rounded-full bg-indigo-600/20 blur-[120px] pointer-events-none"
    ></div>
    <div
      class="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] rounded-full bg-emerald-600/10 blur-[120px] pointer-events-none"
    ></div>

    <div class="glass-card w-full max-w-md p-8 md:p-10 relative z-10 mx-4">
      <div class="text-center mb-8">
        <div
          class="w-16 h-16 mx-auto mb-4 rounded-full bg-indigo-500/20 flex items-center justify-center"
        >
          <i class="fas fa-shield-alt text-2xl text-indigo-400"></i>
        </div>
        <h1
          class="text-2xl font-bold bg-gradient-to-r from-indigo-400 to-indigo-600 bg-clip-text text-transparent mb-2"
        >
          Xác thực hai lớp
        </h1>
        <p class="text-slate-400 text-sm">
          Nhập mã xác thực từ ứng dụng
          <strong class="text-slate-300">Google Authenticator</strong>
        </p>
        <p
          th:if="${username}"
          class="text-slate-500 text-xs mt-1"
        >
          Tài khoản: <span th:text="${username}" class="text-indigo-400"></span>
        </p>
      </div>

      <!-- Error message -->
      <div
        th:if="${errorMessage}"
        class="mb-6 p-4 rounded-xl bg-rose-500/10 border border-rose-500/30 text-rose-400 flex items-center gap-3 animate-[slideIn_0.3s_ease-out]"
      >
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${errorMessage}"></span>
      </div>

      <form
        th:action="@{/auth/verify-2fa}"
        th:object="${totpVerifyRequest}"
        method="post"
        class="space-y-5"
      >
        <div>
          <label for="code" class="form-label">Mã xác thực (6 chữ số)</label>
          <input
            type="text"
            id="code"
            th:field="*{code}"
            placeholder="000000"
            maxlength="6"
            pattern="[0-9]{6}"
            inputmode="numeric"
            autocomplete="one-time-code"
            required
            class="form-input text-center text-2xl tracking-[0.5em] font-mono"
            oninput="this.value=this.value.replace(/[^0-9]/g,'')"
          />
          <p class="text-slate-500 text-xs mt-2 text-center">
            <i class="fas fa-info-circle mr-1"></i>
            Mã có hiệu lực trong 30 giây. Nếu hết hạn, vui lòng chờ mã mới.
          </p>
        </div>

        <button type="submit" class="btn-primary w-full mt-2">
          <i class="fas fa-check-circle"></i> Xác nhận
        </button>
      </form>

      <div class="mt-6 pt-6 border-t border-slate-700/50 text-center">
        <a
          th:href="@{/auth/login}"
          class="text-slate-400 hover:text-slate-300 text-sm transition-colors"
        >
          <i class="fas fa-arrow-left mr-1"></i> Quay lại đăng nhập
        </a>
      </div>
    </div>

    <script>
      // Auto-focus on the code input
      document.addEventListener('DOMContentLoaded', function() {
        const codeInput = document.getElementById('code');
        if (codeInput) {
          codeInput.focus();
        }
      });
    </script>
  </body>
</html>
