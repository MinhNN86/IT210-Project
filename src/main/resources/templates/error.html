<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments/header :: header('Đã xảy ra lỗi')}"></head>
  <body
    class="bg-app-bg text-slate-200 font-sans antialiased min-h-screen flex items-center justify-center relative overflow-hidden"
  >
    <!-- Background glow -->
    <div
      class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] rounded-full bg-rose-600/10 blur-[120px] pointer-events-none"
    ></div>

    <div
      class="glass-card w-full max-w-md p-10 text-center relative z-10 mx-4 border-rose-500/20"
    >
      <div class="text-6xl mb-6">⚠️</div>
      <h1 class="text-2xl font-bold text-slate-100 mb-2">Đã xảy ra lỗi</h1>

      <div
        class="bg-rose-500/10 border border-rose-500/20 text-rose-300 p-4 rounded-xl mb-8"
      >
        <p
          th:text="${errorMessage != null ? errorMessage : 'Hệ thống đang gặp sự cố, vui lòng thử lại sau.'}"
        ></p>
      </div>

      <a
        th:href="@{/}"
        class="inline-flex items-center gap-2 bg-gradient-to-r from-indigo-600 to-indigo-500 text-white px-6 py-3 rounded-xl font-medium hover:shadow-[0_8px_25px_-5px_rgba(99,102,241,0.5)] hover:-translate-y-0.5 transition-all duration-300"
      >
        <i class="fas fa-home"></i> Về trang chủ
      </a>
    </div>
  </body>
</html>
