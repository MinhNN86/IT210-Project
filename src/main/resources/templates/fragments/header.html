<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:fragment="header(title)">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${title}">Smart Academic Platform</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
            colors: {
              app: {
                bg: "#020617", // slate-950 for deep dark ocean
                card: "rgba(15, 23, 42, 0.6)", // slate-900
                border: "rgba(6, 182, 212, 0.15)", // cyan-500
              },
            },
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      @layer utilities {
        .glass-card {
          @apply bg-slate-900/80 backdrop-blur-md border border-cyan-500/20 rounded-2xl shadow-xl transition-all duration-300 hover:border-cyan-500/40;
        }
        .glass-panel {
          @apply bg-slate-900/95 backdrop-blur-xl border border-cyan-500/10;
        }
        .btn-primary {
          @apply bg-gradient-to-r from-cyan-600 to-teal-500 text-white px-5 py-2.5 rounded-xl font-medium hover:shadow-[0_8px_25px_-5px_rgba(6,182,212,0.5)] hover:-translate-y-0.5 transition-all duration-300 flex items-center justify-center gap-2;
        }
        .btn-success {
          @apply bg-gradient-to-r from-emerald-500 to-emerald-400 text-white px-5 py-2.5 rounded-xl font-medium hover:shadow-[0_8px_25px_-5px_rgba(16,185,129,0.5)] hover:-translate-y-0.5 transition-all duration-300 flex items-center justify-center gap-2;
        }
        .btn-danger {
          @apply bg-gradient-to-r from-rose-500 to-rose-400 text-white px-5 py-2.5 rounded-xl font-medium hover:shadow-[0_8px_25px_-5px_rgba(244,63,94,0.5)] hover:-translate-y-0.5 transition-all duration-300 flex items-center justify-center gap-2;
        }
        .btn-warning {
          @apply bg-gradient-to-r from-amber-500 to-amber-400 text-slate-900 px-5 py-2.5 rounded-xl font-medium hover:shadow-[0_8px_25px_-5px_rgba(245,158,11,0.5)] hover:-translate-y-0.5 transition-all duration-300 flex items-center justify-center gap-2;
        }
        .form-input {
          @apply w-full bg-slate-900/60 border border-cyan-500/30 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all duration-300;
        }
        .form-label {
          @apply block text-sm font-medium text-slate-300 mb-1.5;
        }
        .table-container {
          @apply w-full overflow-x-auto;
        }
        .table-custom {
          @apply w-full text-left border-collapse;
        }
        .table-custom th {
          @apply p-4 text-xs font-semibold tracking-wider text-slate-400 uppercase border-b border-cyan-500/20;
        }
        .table-custom td {
          @apply p-4 text-sm text-slate-300 border-b border-cyan-500/10;
        }
        .table-custom tbody tr {
          @apply hover:bg-cyan-500/5 transition-colors duration-200;
        }
        .badge-pending {
          @apply inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-amber-500/15 text-amber-400 border border-amber-500/30;
        }
        .badge-completed {
          @apply inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-emerald-500/15 text-emerald-400 border border-emerald-500/30;
        }
        .badge-cancelled {
          @apply inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-rose-500/15 text-rose-400 border border-rose-500/30;
        }
        .badge-dispatched {
          @apply inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-blue-500/15 text-blue-400 border border-blue-500/30;
        }
      }
    </style>
  </head>
</html>
