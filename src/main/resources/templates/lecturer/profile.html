<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layouts/main-layout :: layout('Hồ sơ cá nhân', ~{::content})}"
>
  <div th:fragment="content">
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-slate-100 flex items-center gap-3">
        <i class="fas fa-user text-indigo-400"></i> Hồ sơ cá nhân
      </h1>
    </div>

    <div class="glass-card max-w-4xl p-8">
      <!-- Flash messages -->
      <div th:if="${successMessage}" class="mb-6 p-4 rounded-lg bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 flex items-center gap-2">
        <i class="fas fa-check-circle"></i>
        <span th:text="${successMessage}"></span>
      </div>
      <div th:if="${errorMessage}" class="mb-6 p-4 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 flex items-center gap-2">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${errorMessage}"></span>
      </div>

      <form th:action="@{/profile}" method="post" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label for="username" class="form-label">Tên đăng nhập</label>
            <input
              type="text"
              id="username"
              name="username"
              th:value="${user.username}"
              class="form-input"
              required
            />
          </div>
          <div>
            <label for="email" class="form-label">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              th:value="${user.email}"
              class="form-input"
              required
            />
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label for="fullName" class="form-label">Họ và tên</label>
            <input
              type="text"
              id="fullName"
              name="fullName"
              th:value="${user.fullName}"
              class="form-input"
            />
          </div>
          <div>
            <label for="phone" class="form-label">Số điện thoại</label>
            <input
              type="text"
              id="phone"
              name="phone"
              th:value="${user.phone}"
              class="form-input"
            />
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label for="gender" class="form-label">Giới tính</label>
            <select
              id="gender"
              name="gender"
              class="form-input [&>option]:bg-slate-800"
            >
              <option value="">-- Chọn --</option>
              <option
                value="MALE"
                th:selected="${user.gender != null && user.gender.name() == 'MALE'}"
              >
                Nam
              </option>
              <option
                value="FEMALE"
                th:selected="${user.gender != null && user.gender.name() == 'FEMALE'}"
              >
                Nữ
              </option>
              <option
                value="OTHER"
                th:selected="${user.gender != null && user.gender.name() == 'OTHER'}"
              >
                Khác
              </option>
            </select>
          </div>
          <div>
            <label for="dob" class="form-label">Ngày sinh</label>
            <input
              type="date"
              id="dob"
              name="dob"
              th:value="${user.dob}"
              class="form-input [&::-webkit-calendar-picker-indicator]:filter-invert"
            />
          </div>
        </div>

        <div>
          <label for="address" class="form-label">Địa chỉ</label>
          <textarea
            id="address"
            name="address"
            rows="3"
            th:text="${user.address}"
            class="form-input resize-none"
          ></textarea>
        </div>

        <div class="pt-4 border-t border-indigo-500/10">
          <button type="submit" class="btn-success">
            <i class="fas fa-save"></i> Cập nhật thông tin
          </button>
        </div>
      </form>
    </div>

    <!-- 2FA Security Section -->
    <div class="glass-card max-w-4xl p-8 mt-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-slate-100 flex items-center gap-2">
          <i class="fas fa-shield-alt text-indigo-400"></i> Bảo mật hai lớp (2FA)
        </h2>
        <span
          th:if="${user.twoFactorEnabled}"
          class="px-3 py-1 rounded-full text-xs font-medium bg-emerald-500/10 border border-emerald-500/30 text-emerald-400"
        >
          <i class="fas fa-check-circle mr-1"></i>Đã kích hoạt
        </span>
        <span
          th:unless="${user.twoFactorEnabled}"
          class="px-3 py-1 rounded-full text-xs font-medium bg-amber-500/10 border border-amber-500/30 text-amber-400"
        >
          <i class="fas fa-exclamation-triangle mr-1"></i>Chưa kích hoạt
        </span>
      </div>
      <p class="text-slate-400 text-sm mb-4">
        Bảo vệ tài khoản của bạn bằng xác thực hai lớp với Google Authenticator.
        Mỗi lần đăng nhập, bạn sẽ cần nhập thêm mã xác thực từ điện thoại.
      </p>
      <a
        th:href="@{/auth/2fa-setup}"
        class="btn-primary inline-flex items-center gap-2"
      >
        <i class="fas fa-cog"></i>
        <span th:text="${user.twoFactorEnabled} ? 'Quản lý 2FA' : 'Thiết lập 2FA'">Thiết lập 2FA</span>
      </a>
    </div>
  </div>
</html>
