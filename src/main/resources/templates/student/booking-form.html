<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layouts/main-layout :: layout('Đặt lịch tư vấn', ~{::content})}"
>
  <div th:fragment="content">
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-slate-100 flex items-center gap-3">
        <i class="fas fa-calendar-plus text-indigo-400"></i> Đặt lịch Cố vấn Học
        thuật
      </h1>
    </div>

    <div class="glass-card max-w-3xl p-8">
      <form
        th:action="@{/student/book}"
        th:object="${createSessionRequest}"
        method="post"
        class="space-y-6"
      >
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label for="departmentId" class="form-label">Khoa / Ngành *</label>
            <select
              id="departmentId"
              th:field="*{departmentId}"
              onchange="loadLecturers()"
              required
              class="form-input [&>option]:bg-slate-800"
            >
              <option value="">-- Chọn Khoa/Ngành --</option>
              <option
                th:each="dept : ${departments}"
                th:value="${dept.id}"
                th:text="${dept.name}"
              ></option>
            </select>
          </div>
          <div>
            <label for="lecturerId" class="form-label">Giảng viên *</label>
            <select
              id="lecturerId"
              th:field="*{lecturerId}"
              required
              class="form-input [&>option]:bg-slate-800"
            >
              <option value="">-- Chọn Giảng viên --</option>
            </select>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div>
            <label for="sessionDate" class="form-label">Ngày tư vấn *</label>
            <input
              type="date"
              id="sessionDate"
              th:field="*{sessionDate}"
              required
              class="form-input [&::-webkit-calendar-picker-indicator]:filter-invert"
            />
          </div>
          <div>
            <label for="startTime" class="form-label">Giờ bắt đầu *</label>
            <select
              id="startTime"
              th:field="*{startTime}"
              required
              class="form-input [&>option]:bg-slate-800"
            >
              <option value="">-- Chọn giờ --</option>
              <option value="07:00">07:00</option>
              <option value="08:00">08:00</option>
              <option value="09:00">09:00</option>
              <option value="10:00">10:00</option>
              <option value="11:00">11:00</option>
              <option value="13:00">13:00</option>
              <option value="14:00">14:00</option>
              <option value="15:00">15:00</option>
              <option value="16:00">16:00</option>
              <option value="17:00">17:00</option>
            </select>
          </div>
          <div>
            <label for="endTime" class="form-label">Giờ kết thúc *</label>
            <select
              id="endTime"
              th:field="*{endTime}"
              required
              class="form-input [&>option]:bg-slate-800"
            >
              <option value="">-- Chọn giờ --</option>
              <option value="08:00">08:00</option>
              <option value="09:00">09:00</option>
              <option value="10:00">10:00</option>
              <option value="11:00">11:00</option>
              <option value="12:00">12:00</option>
              <option value="14:00">14:00</option>
              <option value="15:00">15:00</option>
              <option value="16:00">16:00</option>
              <option value="17:00">17:00</option>
              <option value="18:00">18:00</option>
            </select>
          </div>
        </div>

        <div>
          <label for="note" class="form-label">Ghi chú</label>
          <textarea
            id="note"
            th:field="*{note}"
            rows="4"
            placeholder="Nội dung cần tư vấn..."
            class="form-input resize-none"
          ></textarea>
        </div>

        <div class="pt-4 border-t border-indigo-500/10">
          <button type="submit" class="btn-success">
            <i class="fas fa-paper-plane"></i> Đặt lịch ngay
          </button>
        </div>
      </form>
    </div>

    <script th:inline="javascript">
      var allLecturers = /*[[${lecturerList}]]*/ [];
    </script>
    <script th:inline="javascript">
      function loadLecturers() {
        var deptId = document.getElementById("departmentId").value;
        var lecturerSelect = document.getElementById("lecturerId");
        lecturerSelect.innerHTML =
          '<option value="">-- Đang tải... --</option>';
        if (!deptId) {
          lecturerSelect.innerHTML =
            '<option value="">-- Chọn Giảng viên --</option>';
          return;
        }

        var deptIdNum = Number(deptId);
        var filtered = allLecturers.filter(function (l) {
          return l.departmentId === deptIdNum;
        });

        lecturerSelect.innerHTML =
          '<option value="">-- Chọn Giảng viên --</option>';
        if (filtered.length === 0) {
          lecturerSelect.innerHTML =
            '<option value="">-- Không có giảng viên --</option>';
          return;
        }
        filtered.forEach(function (l) {
          var opt = document.createElement("option");
          opt.value = l.id;
          opt.textContent = l.fullName + " (" + (l.academicRank || "") + ")";
          lecturerSelect.appendChild(opt);
        });
      }
      document.addEventListener("DOMContentLoaded", function () {
        var today = new Date().toISOString().split("T")[0];
        document.getElementById("sessionDate").setAttribute("min", today);
      });
    </script>
  </div>
</html>
