<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
  <head th:replace="~{fragments/header :: header(${title})}"></head>
  <body
    class="bg-app-bg text-slate-200 font-sans antialiased min-h-screen flex selection:bg-indigo-500/30 selection:text-indigo-200"
  >
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main
      class="flex-1 ml-64 p-8 min-h-screen flex flex-col relative overflow-hidden"
    >
      <!-- Background decorations -->
      <div
        class="absolute top-[-10%] right-[-5%] w-[40%] h-[40%] rounded-full bg-indigo-600/10 blur-[120px] pointer-events-none"
      ></div>
      <div
        class="absolute bottom-[-10%] left-[20%] w-[30%] h-[30%] rounded-full bg-emerald-600/5 blur-[100px] pointer-events-none"
      ></div>

      <!-- Alert Messages -->
      <div
        th:if="${successMessage}"
        class="mb-6 p-4 rounded-xl bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 flex items-center gap-3 animate-[slideIn_0.3s_ease-out]"
      >
        <i class="fas fa-check-circle text-lg"></i>
        <span th:text="${successMessage}"></span>
      </div>
      <div
        th:if="${errorMessage}"
        class="mb-6 p-4 rounded-xl bg-rose-500/10 border border-rose-500/30 text-rose-400 flex items-center gap-3 animate-[slideIn_0.3s_ease-out]"
      >
        <i class="fas fa-exclamation-circle text-lg"></i>
        <span th:text="${errorMessage}"></span>
      </div>

      <div class="flex-1 z-10">
        <div th:replace="${content}"></div>
      </div>

      <div th:replace="~{fragments/footer :: footer}"></div>
    </main>

    <style>
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </body>
</html>
