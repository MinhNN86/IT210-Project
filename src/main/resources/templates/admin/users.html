<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layouts/main-layout :: layout('Quản lý Người dùng', ~{::content})}"
>
  <div th:fragment="content">
    <div
      class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4"
    >
      <h1 class="text-2xl font-bold text-slate-100 flex items-center gap-3">
        <i class="fas fa-users text-indigo-400"></i> Quản lý Người dùng
      </h1>
      <div class="flex items-center gap-3">
        <div
          class="flex gap-1 bg-slate-800/50 rounded-lg p-1 border border-slate-700/50"
        >
          <a
            th:href="@{/admin/users}"
            class="px-3 py-1.5 rounded-md text-sm font-medium transition-colors"
            th:classappend="${selectedRole == null} ? 'bg-indigo-500/20 text-indigo-400 border border-indigo-500/30' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-700/50'"
          >
            Tất cả
          </a>
          <a
            th:href="@{/admin/users(role='STUDENT')}"
            class="px-3 py-1.5 rounded-md text-sm font-medium transition-colors"
            th:classappend="${selectedRole == 'STUDENT'} ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-700/50'"
          >
            Sinh viên
          </a>
          <a
            th:href="@{/admin/users(role='LECTURER')}"
            class="px-3 py-1.5 rounded-md text-sm font-medium transition-colors"
            th:classappend="${selectedRole == 'LECTURER'} ? 'bg-indigo-500/20 text-indigo-400 border border-indigo-500/30' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-700/50'"
          >
            Giảng viên
          </a>
        </div>
        <a
          th:href="@{/admin/users/new(role=${selectedRole})}"
          class="btn-primary shrink-0 py-2 text-sm"
        >
          <i class="fas fa-user-plus"></i> Thêm người dùng
        </a>
      </div>
    </div>

    <div class="glass-card overflow-hidden">
      <div class="table-container" th:if="${users != null && !users.isEmpty()}">
        <table class="table-custom">
          <thead>
            <tr>
              <th class="w-12">#</th>
              <th>Họ và tên</th>
              <th>Tên đăng nhập</th>
              <th>Email</th>
              <th>Vai trò</th>
              <th>Thông tin thêm</th>
              <th>Trạng thái</th>
              <th class="text-right">Thao tác</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="u, stat : ${users}">
              <td
                th:text="${stat.count}"
                class="text-indigo-300 font-mono text-sm"
              ></td>
              <td
                th:text="${u.fullName}"
                class="font-medium text-slate-200"
              ></td>
              <td
                th:text="${u.username}"
                class="font-mono text-xs text-slate-400"
              ></td>
              <td th:text="${u.email}"></td>
              <td>
                <span
                  class="px-2 py-1 rounded-md text-xs font-semibold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20"
                  th:if="${u.role.name() == 'STUDENT'}"
                  >Sinh viên</span
                >
                <span
                  class="px-2 py-1 rounded-md text-xs font-semibold bg-indigo-500/10 text-indigo-400 border border-indigo-500/20"
                  th:if="${u.role.name() == 'LECTURER'}"
                  >Giảng viên</span
                >
              </td>
              <td>
                <div th:if="${u.role.name() == 'LECTURER'}">
                  <span
                    th:each="ld : ${lecturerDetails}"
                    th:if="${ld.user.id == u.id}"
                    class="text-xs text-indigo-300"
                  >
                    <span th:text="${ld.department.name}"></span>
                  </span>
                </div>
                <span
                  th:if="${u.role.name() == 'STUDENT'}"
                  class="text-slate-500 text-xs"
                  >-</span
                >
              </td>
              <td>
                <span class="badge-completed" th:if="${u.isActive}"
                  >Hoạt động</span
                >
                <span
                  class="badge-cancelled opacity-60"
                  th:unless="${u.isActive}"
                  >Đã khóa</span
                >
              </td>
              <td class="text-right whitespace-nowrap">
                <form
                  th:action="@{/admin/users/{id}/toggle-status(id=${u.id})}"
                  method="post"
                  class="inline-block mr-2"
                >
                  <button
                    type="submit"
                    class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-slate-700/50 hover:bg-slate-700 text-slate-300 border border-slate-600 transition-colors"
                    th:title="${u.isActive ? 'Khóa tài khoản' : 'Mở khóa tài khoản'}"
                  >
                    <i
                      class="fas"
                      th:classappend="${u.isActive ? 'fa-lock' : 'fa-unlock'}"
                    ></i>
                  </button>
                </form>
                <a
                  th:href="@{/admin/users/{id}/edit(id=${u.id})}"
                  class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-amber-500/10 text-amber-400 hover:bg-amber-500/20 border border-amber-500/20 transition-colors mr-2"
                  title="Sửa"
                >
                  <i class="fas fa-edit"></i>
                </a>
                <form
                  th:action="@{/admin/users/{id}/delete(id=${u.id})}"
                  method="post"
                  class="inline-block"
                  onsubmit="
                    return confirm(
                      'Bạn có chắc chắn muốn xóa tài khoản này không? Hành động này không thể hoàn tác!',
                    );
                  "
                >
                  <button
                    type="submit"
                    class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-rose-500/10 text-rose-400 hover:bg-rose-500/20 border border-rose-500/20 transition-colors"
                    title="Xóa"
                  >
                    <i class="fas fa-trash"></i>
                  </button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div
        class="py-16 text-center text-slate-400"
        th:if="${users == null || users.isEmpty()}"
      >
        <i class="fas fa-users-slash text-5xl opacity-30 mb-4"></i>
        <p class="text-lg">Không có người dùng nào được tìm thấy</p>
      </div>
    </div>
  </div>
</html>
