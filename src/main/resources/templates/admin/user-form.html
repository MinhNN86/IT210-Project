<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layouts/main-layout :: layout('Người dùng', ~{::content})}"
>
  <div th:fragment="content">
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-slate-100 flex items-center gap-3">
        <i class="fas fa-user-edit text-indigo-400"></i>
        <span
          th:text="${isEdit} ? 'Sửa thông tin người dùng' : 'Thêm người dùng mới'"
        ></span>
      </h1>
    </div>

    <div class="glass-card max-w-4xl p-8">
      <form
        th:action="${isEdit} ? @{/admin/users/{id}(id=${user.id})} : @{/admin/users}"
        th:object="${user}"
        method="post"
        class="space-y-6"
      >
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label for="username" class="form-label">Tên đăng nhập *</label>
            <input
              type="text"
              id="username"
              th:field="*{username}"
              placeholder="vd: nguyenvana"
              required
              class="form-input font-mono"
              th:readonly="${isEdit}"
              th:classappend="${isEdit ? 'opacity-60 cursor-not-allowed' : ''}"
            />
          </div>
          <div>
            <label for="email" class="form-label">Email *</label>
            <input
              type="email"
              id="email"
              th:field="*{email}"
              placeholder="vd: email@uni.edu.vn"
              required
              class="form-input"
            />
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label for="fullName" class="form-label">Họ và tên *</label>
            <input
              type="text"
              id="fullName"
              th:field="*{fullName}"
              placeholder="Nguyễn Văn A"
              required
              class="form-input"
            />
          </div>
          <div>
            <label for="phone" class="form-label">Số điện thoại</label>
            <input
              type="text"
              id="phone"
              th:field="*{phone}"
              placeholder="0987654321"
              class="form-input"
            />
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label for="role" class="form-label">Vai trò *</label>
            <select
              id="role"
              name="role"
              required
              class="form-input [&>option]:bg-slate-800"
              onchange="toggleLecturerFields()"
              th:disabled="${isEdit}"
            >
              <option
                value="STUDENT"
                th:selected="${selectedRole == 'STUDENT'}"
              >
                Sinh viên
              </option>
              <option
                value="LECTURER"
                th:selected="${selectedRole == 'LECTURER'}"
              >
                Giảng viên
              </option>
            </select>
            <!-- Add hidden input for role if in edit mode because disabled select won't be submitted -->
            <input
              type="hidden"
              name="role"
              th:value="${selectedRole}"
              th:if="${isEdit}"
            />
          </div>
          <div>
            <label for="isActive" class="form-label">Trạng thái</label>
            <select
              id="isActive"
              th:field="*{isActive}"
              class="form-input [&>option]:bg-slate-800"
            >
              <option value="true">Hoạt động</option>
              <option value="false">Đã khóa</option>
            </select>
          </div>
        </div>

        <div>
          <label for="newPassword" class="form-label"
            >Mật khẩu <span th:if="${!isEdit}">*</span></label
          >
          <!-- Dùng name="passwordHash" cho CREATE (map vào object), nhưng cho EDIT, ta gửi qua name="newPassword" (parameter riêng trong controller) -->
          <input
            type="password"
            th:if="${!isEdit}"
            id="password"
            th:field="*{passwordHash}"
            placeholder="Tối thiểu 6 ký tự"
            required
            class="form-input"
          />
          <input
            type="password"
            th:if="${isEdit}"
            id="newPassword"
            name="newPassword"
            placeholder="Nhập mật khẩu mới nếu muốn thay đổi, bỏ trống để giữ nguyên"
            class="form-input"
          />
        </div>

        <!-- Lecturer specific fields -->
        <div
          id="lecturerFields"
          class="hidden space-y-6 bg-indigo-500/5 border border-indigo-500/20 p-6 rounded-xl mt-6"
        >
          <h3
            class="text-lg font-semibold text-indigo-300 mb-2 border-b border-indigo-500/20 pb-2"
          >
            <i class="fas fa-chalkboard-teacher"></i> Thông tin Giảng viên
          </h3>
          <div>
            <label for="departmentId" class="form-label text-indigo-300"
              >Khoa / Ngành *</label
            >
            <select
              id="departmentId"
              name="departmentId"
              class="form-input [&>option]:bg-slate-800 border-indigo-500/40"
            >
              <option value="">-- Chọn Khoa --</option>
              <option
                th:each="dept : ${departments}"
                th:value="${dept.id}"
                th:text="${dept.name}"
                th:selected="${lecturerDetail != null && lecturerDetail.department != null && lecturerDetail.department.id == dept.id}"
              ></option>
            </select>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label for="academicRank" class="form-label text-indigo-300"
                >Học hàm / Học vị</label
              >
              <input
                type="text"
                id="academicRank"
                name="academicRank"
                th:value="${lecturerDetail != null ? lecturerDetail.academicRank : ''}"
                placeholder="vd: Tiến sĩ"
                class="form-input border-indigo-500/40"
              />
            </div>
            <div>
              <label for="specialization" class="form-label text-indigo-300"
                >Chuyên ngành</label
              >
              <input
                type="text"
                id="specialization"
                name="specialization"
                th:value="${lecturerDetail != null ? lecturerDetail.specialization : ''}"
                placeholder="vd: Kỹ thuật phần mềm"
                class="form-input border-indigo-500/40"
              />
            </div>
          </div>
        </div>

        <div class="pt-6 border-t border-indigo-500/10 flex gap-4">
          <button type="submit" class="btn-success">
            <i class="fas fa-save"></i>
            <span th:text="${isEdit} ? 'Cập nhật' : 'Thêm mới'"></span>
          </button>
          <a
            th:href="@{/admin/users}"
            class="btn-warning bg-slate-700 hover:bg-slate-600 hover:shadow-none text-slate-200"
          >
            Hủy & Quay lại
          </a>
        </div>
      </form>
    </div>
    <script>
      function toggleLecturerFields() {
        var roleElement = document.getElementById("role");
        if (!roleElement && document.querySelector('input[name="role"]')) {
          roleElement = document.querySelector('input[name="role"]');
        }

        var role = roleElement ? roleElement.value : "STUDENT";
        var fields = document.getElementById("lecturerFields");
        var deptInput = document.getElementById("departmentId");

        if (role === "LECTURER") {
          fields.classList.remove("hidden");
          deptInput.setAttribute("required", "required");
        } else {
          fields.classList.add("hidden");
          deptInput.removeAttribute("required");
        }
      }

      document.addEventListener("DOMContentLoaded", toggleLecturerFields);
    </script>
  </div>
