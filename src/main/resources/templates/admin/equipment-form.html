<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layouts/main-layout :: layout('Thiết bị', ~{::content})}"
>
  <div th:fragment="content">
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-slate-100 flex items-center gap-3">
        <i class="fas fa-tools text-indigo-400"></i>
        <span th:text="${isEdit} ? 'Sửa thiết bị' : 'Thêm thiết bị mới'"></span>
      </h1>
    </div>

    <div class="glass-card max-w-3xl p-8">
      <form
        th:action="${isEdit} ? @{/admin/equipments/{id}(id=${equipmentId})} : @{/admin/equipments}"
        th:object="${equipmentRequest}"
        method="post"
        class="space-y-6"
      >
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label for="code" class="form-label">Mã thiết bị *</label>
            <input
              type="text"
              id="code"
              th:field="*{code}"
              placeholder="VD: LAP-001"
              required
              class="form-input font-mono"
            />
          </div>
          <div>
            <label for="name" class="form-label">Tên thiết bị *</label>
            <input
              type="text"
              id="name"
              th:field="*{name}"
              placeholder="VD: Laptop Dell"
              required
              class="form-input"
            />
          </div>
        </div>

        <div>
          <label for="description" class="form-label">Mô tả</label>
          <textarea
            id="description"
            th:field="*{description}"
            rows="4"
            placeholder="Mô tả chi tiết..."
            class="form-input resize-none"
          ></textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label for="quantityInStock" class="form-label"
              >Số lượng tồn kho *</label
            >
            <input
              type="number"
              id="quantityInStock"
              th:field="*{quantityInStock}"
              min="0"
              required
              class="form-input"
            />
          </div>
          <div>
            <label for="minimumStock" class="form-label"
              >Tồn kho tối thiểu</label
            >
            <input
              type="number"
              id="minimumStock"
              th:field="*{minimumStock}"
              min="0"
              class="form-input"
            />
          </div>
        </div>

        <div class="pt-6 border-t border-indigo-500/10 flex gap-4">
          <button type="submit" class="btn-success">
            <i class="fas fa-save"></i>
            <span th:text="${isEdit} ? 'Cập nhật' : 'Thêm mới'"></span>
          </button>
          <a
            th:href="@{/admin/equipments}"
            class="btn-warning bg-slate-700 hover:bg-slate-600 hover:shadow-none text-slate-200"
          >
            Quay lại
          </a>
        </div>
      </form>
    </div>
  </div>
</html>
