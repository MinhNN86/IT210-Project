# ============================================================
# Application
# ============================================================
spring.application.name=Project-IT210
server.port=8080

# ============================================================
# MySQL Datasource
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/smart_academic_platform?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
# Thymeleaf
# ============================================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# ============================================================
# Data Initialization
# ============================================================
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# ============================================================
# JWT Configuration
# ============================================================
app.jwt.secret=SmartAcademicPlatformSecretKeyIT210ProjectJWT2026VeryLongSecretKey
app.jwt.expiration-ms=86400000
app.jwt.cookie-name=token
